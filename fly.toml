# Rename this before deploying; Fly app names are globally unique.
app = "bindkit-example"
primary_region = "waw"

[build]
  dockerfile = "Dockerfile"

[env]
  BINDKIT_TRANSPORT = "http"
  BINDKIT_HTTP_ADDR = ":8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
